    const buildingPrices = {
      clicker: [
        { tier: 1, base: 5, upgrade: 500 },
        { tier: 2, base: 50, upgrade: 2500 },
        { tier: 3, base: 750, upgrade: 12500 },
        { tier: 4, base: 7500, upgrade: 35000 },
        { tier: 5, base: 75000, upgrade: 65000 },
        { tier: 6, base: 500000, upgrade: 150000 },
        { tier: 7, base: 6500000, upgrade: 350000 },

        { tier: 9, base: 1200000000, upgrade: 3500000 },
        { tier: 10, base: 20000000000, upgrade: 7500000 },
      ],
      passive: [
        { tier: 1, base: 100, upgrade: 750 },
        { tier: 2, base: 750, upgrade: 3750 },
        { tier: 3, base: 10000, upgrade: 18750 },
        { tier: 4, base: 100000, upgrade: 52500 },
        { tier: 5, base: 1250000, upgrade: 97500 },

        { tier: 9, base: 50000000000, upgrade: 5250000 },
        { tier: 10, base: 750000000000, upgrade: 11250000 },

    const costScaling = Array.from({ length: 30 }, (_, i) => {
      const n = i + 1;
      const clickerCost = Math.round(5 * ((Math.pow(1.65, n) - 1) / (1.65 - 1)));
      const passiveCost = Math.round(100 * ((Math.pow(1.25, n) - 1) / (1.25 - 1)));
      return { n, clickerCost, passiveCost };
    });

    const buildingsAt1M = [
      {val:31,count:1},{val:39,count:1},{val:42,count:1},{val:43,count:1},{val:47,count:1},
      {val:50,count:1},{val:55,count:1},{val:56,count:1},{val:57,count:1},{val:59,count:1},
      {val:60,count:1},{val:61,count:1},{val:62,count:2},{val:64,count:3},{val:65,count:2},
      {val:66,count:2},{val:68,count:2},{val:69,count:2},{val:70,count:2},{val:71,count:1},
      {val:73,count:2},{val:74,count:2},{val:75,count:2},{val:76,count:1},{val:77,count:2},
      {val:78,count:3},{val:79,count:1},{val:80,count:1},{val:81,count:2},{val:82,count:1},
      {val:83,count:1},{val:84,count:1},{val:85,count:3},{val:86,count:2},{val:87,count:2},
      {val:88,count:2},{val:89,count:3},{val:90,count:2},{val:91,count:1},{val:92,count:1},
      {val:93,count:1},{val:94,count:2},{val:95,count:2},{val:96,count:2},{val:97,count:1},
      {val:98,count:1},{val:99,count:1},{val:100,count:1},{val:101,count:2},{val:102,count:1},
      {val:103,count:1},{val:108,count:1},{val:115,count:1},{val:121,count:1},{val:132,count:1},
      {val:168,count:1},{val:257,count:1}
    ];

    // ─── THEME (portfolio-aligned) ───────────────────────────────────────
    const theme = {
      bg: "#161619",
      surface: "#1d1d21",
      surfaceHover: "#232328",
      border: "#2c2c32",
      text: "#dddbd6",
      textMuted: "#a09e97",
      accent: "#a8b87a",
      accentDim: "#7a8a55",
      cyan: "#7ec8c8",
      amber: "#d4a95a",
      red: "#c97070",
      purple: "#a78bfa",
    };

    const chartColors = {
      click: "#7ec8c8",
      passive: "#a8b87a",
      total: "#a78bfa",
      bar: "#a8b87a",
      line: "#7ec8c8",
    };

    // ─── HELPERS ─────────────────────────────────────────────────────────
    const fmt = (v) => {
      if (v >= 1e12) return `${(v/1e12).toFixed(1)}T`;
      if (v >= 1e9) return `${(v/1e9).toFixed(1)}B`;
      if (v >= 1e6) return `${(v/1e6).toFixed(1)}M`;
      if (v >= 1e3) return `${(v/1e3).toFixed(1)}K`;
      return v.toString();
    };

    // ─── COMPONENTS ──────────────────────────────────────────────────────

    const CustomTooltip = ({ active, payload, label }) => {
      if (!active || !payload?.length) return null;
      return (
        <div style={{
          background: theme.surface,
          border: `1px solid ${theme.border}`,
          borderRadius: 6,
          padding: "10px 14px",
          fontFamily: "'Geist', system-ui, sans-serif",
          fontSize: 13,
        }}>
          <div style={{ color: theme.textMuted, marginBottom: 6, fontSize: 11, textTransform: "uppercase", letterSpacing: 1 }}>{label}</div>
          {payload.map((p, i) => (
            <div key={i} style={{ color: p.color || theme.text, marginBottom: 2 }}>
              {p.name}: <strong>{typeof p.value === "number" ? p.value.toLocaleString() : p.value}</strong>
              {p.payload?.unit || ""}
            </div>
          ))}
        </div>
      );
    };

    const tabs = [
      { id: "funnel", label: "Player Funnel" },
      { id: "economy", label: "Click vs Passive" },
      { id: "buildings", label: "Building Mix" },
      { id: "upgrades", label: "Upgrades" },
      { id: "time", label: "Time & Clicks" },
      { id: "pricing", label: "Price Curves" },
      { id: "dataQuality", label: "Data Integrity" },
    ];

    const InsightBox = ({ children }) => (
      <div style={{
        background: `${theme.accent}08`,
        border: `1px solid ${theme.accentDim}`,
        borderRadius: 8,
        padding: "12px 16px",
        marginTop: 16,
        fontSize: 13,
        lineHeight: 1.6,
        color: theme.textMuted,
      }}>
        <span style={{ color: theme.accent, fontWeight: 600, marginRight: 6 }}>Insight</span>
        {children}
      </div>
    );

    const WarningBox = ({ children }) => (
      <div style={{
        background: `${theme.amber}08`,
        border: `1px solid ${theme.amber}40`,
        borderRadius: 8,
        padding: "12px 16px",
        marginTop: 16,
        fontSize: 13,
        lineHeight: 1.6,
        color: theme.textMuted,
      }}>
        <span style={{ color: theme.amber, fontWeight: 600, marginRight: 6 }}>Note</span>
        {children}
      </div>
    );

    const StatCard = ({ label, value, sub }) => (
      <div style={{
        background: theme.surface,
        border: `1px solid ${theme.border}`,
        borderRadius: 8,
        padding: "14px 18px",
        flex: 1,
        minWidth: 140,
      }}>
        <div style={{ fontSize: 11, color: theme.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>{label}</div>
        <div style={{ fontSize: 24, fontWeight: 700, color: theme.text, fontFamily: "'Geist', system-ui" }}>{value}</div>
        {sub && <div style={{ fontSize: 12, color: theme.textMuted, marginTop: 2 }}>{sub}</div>}
      </div>
    );

    // ─── BOX PLOT ────────────────────────────────────────────────────────
    function BoxPlotChart({ data, title, color }) {
      const chartData = data.map(d => ({
        ...d,
        iqrRange: d.q3 - d.q1,
      }));
      return (
        <div style={{ marginTop: 16 }}>
          <div style={{ fontSize: 13, color: theme.text, fontWeight: 600, marginBottom: 8 }}>{title}</div>
          <ResponsiveContainer width="100%" height={220}>
            <ComposedChart data={chartData} margin={{ top: 10, right: 20, bottom: 10, left: 10 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={theme.border} />
              <XAxis dataKey="milestone" tick={{ fill: theme.text, fontSize: 13 }} />
              <YAxis tick={{ fill: theme.textMuted, fontSize: 12 }} />
              <Tooltip content={({ active, payload, label }) => {
                if (!active || !payload?.length) return null;
                const d = payload[0]?.payload;
                if (!d) return null;
                return (
                  <div style={{
                    background: theme.surface, border: `1px solid ${theme.border}`,
                    borderRadius: 6, padding: "10px 14px", fontSize: 12,
                  }}>
                    <div style={{ color: theme.textMuted, marginBottom: 6, fontSize: 11, textTransform: "uppercase", letterSpacing: 1 }}>{label} Milestone</div>
                    <div style={{ color: theme.textMuted }}>Q1: <strong style={{ color: theme.text }}>{d.q1.toLocaleString()}</strong></div>
                    <div style={{ color: theme.amber }}>Median: <strong>{d.med.toLocaleString()}</strong></div>
                    <div style={{ color: theme.textMuted }}>Q3: <strong style={{ color: theme.text }}>{d.q3.toLocaleString()}</strong></div>
                    <div style={{ color: theme.purple, marginTop: 4 }}>IQR Mean: <strong>{d.iqrMean.toLocaleString()}</strong></div>
                    <div style={{ color: theme.textMuted, marginTop: 4, fontSize: 11 }}>n={d.n} (kept {d.kept} after IQR filter)</div>
                  </div>
                );
              }} />
              <Bar dataKey="q1" stackId="box" fill="transparent" barSize={50} />
              <Bar dataKey="iqrRange" stackId="box" fill={`${color}30`} stroke={color} strokeWidth={1} barSize={50} radius={[2,2,2,2]} />
              <Line type="monotone" dataKey="med" stroke={theme.amber} strokeWidth={0} dot={{ r: 5, fill: theme.amber, strokeWidth: 0 }} name="Median" />
              <Line type="monotone" dataKey="iqrMean" stroke={theme.purple} strokeWidth={0} dot={{ r: 4, fill: theme.purple, strokeWidth: 0 }} name="IQR Mean" />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      );
    }

    // ─── PANELS ──────────────────────────────────────────────────────────

    function FunnelPanel() {
      const conversionRates = [
        { from: "1K", to: "1M", rate: ((93/220)*100).toFixed(1) },
        { from: "1M", to: "1B", rate: ((25/93)*100).toFixed(1) },
        { from: "1B", to: "1T", rate: ((9/25)*100).toFixed(1) },
      ];
      return (
        <div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
            <StatCard label="Total Tracked" value="220" sub="unique players" />
            <StatCard label="Reached 1T" value="9" sub="4.1% of total" />
            <StatCard label="Steepest Drop" value="1M → 1B" sub="73% drop-off" />
          </div>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={funnelData} margin={{ top: 10, right: 20, bottom: 10, left: 0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={theme.border} />
              <XAxis dataKey="name" tick={{ fill: theme.text, fontSize: 12 }} />
              <YAxis tick={{ fill: theme.textMuted, fontSize: 12 }} />
              <Tooltip content={<CustomTooltip />} />
              <Bar dataKey="players" name="Players" radius={[4,4,0,0]}>
                {funnelData.map((entry, i) => (
                  <Cell key={i} fill={entry.fill} />
                ))}
                <LabelList dataKey="players" position="top" fill={theme.text} fontSize={13} fontWeight={600} />
              </Bar>
            </BarChart>
          </ResponsiveContainer>
          <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
            {conversionRates.map(c => (
              <div key={c.from} style={{
                background: theme.surface, border: `1px solid ${theme.border}`,
                borderRadius: 6, padding: "8px 14px", flex: 1, minWidth: 120, textAlign: "center",
              }}>
                <div style={{ fontSize: 11, color: theme.textMuted }}>{c.from} → {c.to}</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: theme.accent }}>{c.rate}%</div>
              </div>
            ))}
          </div>
          <InsightBox>
            The steepest drop is 1M → 1B (27%), indicating the mid-game progression wall typical of idle games. The 9 players who reached 1T represent the highly engaged core.
          </InsightBox>
        </div>
      );

    function EconomyPanel() {
      return (
        <div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>

          <ResponsiveContainer width="100%" height={320}>

              <Area type="monotone" dataKey="click" stackId="1" stroke={chartColors.click} fill={chartColors.click} fillOpacity={0.3} name="Click %" />
              <Legend />
            </AreaChart>
          </ResponsiveContainer>
          <InsightBox>
            The economy transitions from click-dominant (76%) to passive-dominant (77%) exactly as designed. The crossover happens around the 1B milestone, confirming the idle loop kicks in at mid-game. This is the signature curve of a well-tuned idle economy — active engagement hooks players early, then passive systems sustain long-term retention.
          </InsightBox>
        </div>
      );
    }

      const [showDist, setShowDist] = useState(false);

        <div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>

              <Bar dataKey="clicker" stackId="a" fill={chartColors.click} name="Clicker Buildings" radius={[0,0,0,0]} />
              <Bar dataKey="passive" stackId="a" fill={chartColors.passive} name="Passive Buildings" radius={[4,4,0,0]} />
              <Legend />
            </BarChart>
          </ResponsiveContainer>

          <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
            <button onClick={() => setShowBoxPlots(!showBoxPlots)} style={{
              background: showBoxPlots ? theme.surfaceHover : theme.surface,
              border: `1px solid ${showBoxPlots ? theme.accent : theme.border}`,
              borderRadius: 6, padding: "8px 16px",
              color: theme.accent, cursor: "pointer", fontSize: 13,
            }}>
              {showBoxPlots ? "Hide" : "Show"} IQR box plots
            </button>
            <button onClick={() => setShowDist(!showDist)} style={{
              background: showDist ? theme.surfaceHover : theme.surface,
              border: `1px solid ${showDist ? theme.cyan : theme.border}`,
              borderRadius: 6, padding: "8px 16px",
              color: theme.cyan, cursor: "pointer", fontSize: 13,

              {showDist ? "Hide" : "Show"} 1M distribution

          {showBoxPlots && (

              <strong style={{ color: theme.textMuted }}>Resolution:</strong> Corrected increment targets across all affected purchase functions (upgrades 11–24).
            </div>
          </div>

            background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 8,

              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                style={{
                  background: activeTab === tab.id ? theme.surfaceHover : "transparent",
                  border: "none",
                  borderBottom: activeTab === tab.id ? `2px solid ${theme.accent}` : "2px solid transparent",
                  padding: "7px 14px",
                  color: activeTab === tab.id ? theme.text : theme.textMuted,
                  fontSize: 12,
                  fontWeight: activeTab === tab.id ? 600 : 400,
                  cursor: "pointer",
                  borderRadius: "6px 6px 0 0",
                  transition: "all 0.15s",
                }}
              >
                {tab.label}
              </button>
            ))}
          </div>

          {/* Active Panel */}
          <div style={{
            background: theme.surface,
            border: `1px solid ${theme.border}`,
            borderRadius: 8,
            padding: "20px 16px",
          }}>
            {panels[activeTab]}
          </div>

          {/* Footer */}
          <div style={{
            marginTop: 16,
            fontSize: 11,
            color: theme.textMuted,
            textAlign: "center",
          }}>
            Jhorro Productions · Analytics Dashboard · Data: Unity Analytics (pre-1.40)
          </div>
        </div>
      );
    }

    // ─── RENDER ──────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Dashboard />);
  </script>
</body>
</html>
