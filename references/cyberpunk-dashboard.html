<head>

  <!-- React 18 -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Recharts (includes its own deps) -->

  <!-- Babel standalone for in-browser JSX -->

</head>
<body>

        { milestone: "1M", q1: 27, med: 37, q3: 46, min: 0, max: 118, iqrMean: 34.3, n: 93, kept: 91 },

      ],
      passiveUpgrades: [

        { milestone: "1T", q1: 24, med: 40, q3: 40, min: 3, max: 58, iqrMean: 34.3, n: 9, kept: 9 },
      ],
      totalClicks: [
        { milestone: "1K", q1: 196, med: 302, q3: 467, min: 0, max: 1000, iqrMean: 320.1, n: 220, kept: 208 },
        { milestone: "1M", q1: 1918, med: 2441, q3: 3372, min: 0, max: 48112, iqrMean: 2348.9, n: 93, kept: 86 },

    const buildingPrices = {
      clicker: [
        { tier: 1, base: 5, upgrade: 500 },
        { tier: 2, base: 50, upgrade: 2500 },
        { tier: 3, base: 750, upgrade: 12500 },
        { tier: 4, base: 7500, upgrade: 35000 },
        { tier: 5, base: 75000, upgrade: 69000 },
        { tier: 6, base: 750000, upgrade: 175000 },
        { tier: 7, base: 1e7, upgrade: 325000 },
        { tier: 8, base: 1.75e8, upgrade: 1125000 },
        { tier: 9, base: 2.5e9, upgrade: 2750000 },
        { tier: 10, base: 4e10, upgrade: 5895000 },
      ],
      passive: [
        { tier: 1, base: 10, upgrade: 150 },
        { tier: 2, base: 100, upgrade: 1500 },
        { tier: 3, base: 1600, upgrade: 20500 },
        { tier: 4, base: 14500, upgrade: 215000 },
        { tier: 5, base: 130000, upgrade: 2300000 },
        { tier: 6, base: 1675000, upgrade: 2.25e7 },
        { tier: 7, base: 2e7, upgrade: 3e8 },
        { tier: 8, base: 3.5e8, upgrade: 5.25e9 },
        { tier: 9, base: 5e9, upgrade: 7.5e10 },
        { tier: 10, base: 8e10, upgrade: 1.2e12 },
      ],
      clickerMult: 1.65,
      passiveMult: 1.25,
      clickerUpgMult: 10,
      passiveUpgMult: 5,
    };

    const costScaling = [];
    const clickerBase = 5, clickerMult = 1.65;
    const passiveBase = 10, passiveMult = 1.25;
    let cCum = 0, pCum = 0, cPrice = clickerBase, pPrice = passiveBase;
    for (let i = 1; i <= 30; i++) {
      cCum += cPrice; pCum += pPrice;
      costScaling.push({ n: i, clickerCost: Math.round(cCum), passiveCost: Math.round(pCum) });
      cPrice *= clickerMult; pPrice *= passiveMult;
    }

    const buildingDist1K = [
      {val:0,count:7},{val:2,count:1},{val:3,count:5},{val:4,count:6},{val:5,count:7},
      {val:6,count:7},{val:7,count:9},{val:8,count:4},{val:9,count:16},{val:10,count:15},
      {val:11,count:11},{val:12,count:13},{val:13,count:22},{val:14,count:22},{val:15,count:10},
      {val:16,count:19},{val:17,count:21},{val:18,count:14},{val:19,count:1},{val:20,count:2},
      {val:21,count:1},{val:23,count:1},{val:27,count:1},{val:40,count:1},{val:44,count:1},
      {val:49,count:1},{val:65,count:1},{val:84,count:1}
    ];

    const buildingDist1M = [
      {val:31,count:1},{val:35,count:1},{val:42,count:1},{val:43,count:1},{val:47,count:1},
      {val:50,count:1},{val:54,count:1},{val:55,count:1},{val:56,count:2},{val:57,count:2},
      {val:58,count:1},{val:59,count:1},{val:60,count:2},{val:61,count:1},{val:62,count:1},
      {val:63,count:1},{val:64,count:1},{val:65,count:2},{val:66,count:1},{val:67,count:1},
      {val:68,count:2},{val:69,count:2},{val:70,count:2},{val:71,count:2},{val:72,count:2},
      {val:73,count:2},{val:74,count:2},{val:75,count:2},{val:76,count:1},{val:77,count:2},
      {val:78,count:3},{val:79,count:1},{val:80,count:1},{val:81,count:2},{val:82,count:1},
      {val:83,count:1},{val:84,count:1},{val:85,count:3},{val:86,count:2},{val:87,count:2},
      {val:88,count:2},{val:89,count:3},{val:90,count:2},{val:91,count:1},{val:92,count:1},
      {val:93,count:1},{val:94,count:2},{val:95,count:2},{val:96,count:2},{val:97,count:1},
      {val:98,count:1},{val:99,count:1},{val:100,count:1},{val:101,count:2},{val:102,count:1},
      {val:103,count:1},{val:108,count:1},{val:115,count:1},{val:121,count:1},{val:132,count:1},
      {val:168,count:1},{val:257,count:1}
    ];

    // ─── THEME ───────────────────────────────────────────────────────────
    const theme = {
      bg: "#0c0f14",
      surface: "#13161d",
      surfaceHover: "#1a1e28",
      border: "#1f2430",
      text: "#e2e4e9",
      textMuted: "#7a7f8e",
      accent: "#4ade80",
      accentDim: "#22643a",
      cyan: "#22d3ee",
      amber: "#fbbf24",
      red: "#f87171",
      purple: "#a78bfa",
    };

    const chartColors = {
      click: "#22d3ee",
      passive: "#4ade80",
      total: "#a78bfa",
      bar: "#4ade80",
      line: "#22d3ee",
    };

    // ─── HELPERS ────────────────────────────────────────────────────────
    const fmt = (v) => {
      if (v >= 1e12) return `${(v/1e12).toFixed(1)}T`;
      if (v >= 1e9) return `${(v/1e9).toFixed(1)}B`;
      if (v >= 1e6) return `${(v/1e6).toFixed(1)}M`;
      if (v >= 1e3) return `${(v/1e3).toFixed(1)}K`;
      return v.toString();
    };

    // ─── COMPONENTS ──────────────────────────────────────────────────────

    const CustomTooltip = ({ active, payload, label }) => {
      if (!active || !payload?.length) return null;
      return (
        <div style={{
          background: theme.surface,
          border: `1px solid ${theme.border}`,
          borderRadius: 6,
          padding: "10px 14px",
          fontFamily: "'Geist', system-ui, sans-serif",
          fontSize: 13,
        }}>
          <div style={{ color: theme.textMuted, marginBottom: 6, fontSize: 11, textTransform: "uppercase", letterSpacing: 1 }}>{label}</div>
          {payload.map((p, i) => (
            <div key={i} style={{ color: p.color || theme.text, marginBottom: 2 }}>
              {p.name}: <strong>{typeof p.value === "number" ? p.value.toLocaleString() : p.value}</strong>
              {p.payload?.unit || ""}
            </div>
          ))}
        </div>
      );
    };

    const tabs = [
      { id: "funnel", label: "Player Funnel" },
      { id: "economy", label: "Click vs Passive" },
      { id: "buildings", label: "Building Mix" },
      { id: "upgrades", label: "Upgrades" },
      { id: "time", label: "Time & Clicks" },
      { id: "pricing", label: "Price Curves" },
      { id: "dataQuality", label: "Data Integrity" },
    ];

    const InsightBox = ({ children }) => (
      <div style={{
        background: `${theme.accent}08`,
        border: `1px solid ${theme.accentDim}`,
        borderRadius: 8,
        padding: "12px 16px",
        marginTop: 16,
        fontSize: 13,
        lineHeight: 1.6,
        color: theme.textMuted,
      }}>
        <span style={{ color: theme.accent, fontWeight: 600, marginRight: 6 }}>Insight</span>
        {children}
      </div>
    );

    const WarningBox = ({ children }) => (
      <div style={{
        background: `${theme.amber}08`,
        border: `1px solid ${theme.amber}40`,
        borderRadius: 8,
        padding: "12px 16px",
        marginTop: 16,
        fontSize: 13,
        lineHeight: 1.6,
        color: theme.textMuted,
      }}>
        <span style={{ color: theme.amber, fontWeight: 600, marginRight: 6 }}>Note</span>
        {children}
      </div>
    );

    const StatCard = ({ label, value, sub }) => (
      <div style={{
        background: theme.surface,
        border: `1px solid ${theme.border}`,
        borderRadius: 8,
        padding: "14px 18px",
        flex: 1,
        minWidth: 140,
      }}>
        <div style={{ fontSize: 11, color: theme.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>{label}</div>
        <div style={{ fontSize: 24, fontWeight: 700, color: theme.text, fontFamily: "'Geist', system-ui" }}>{value}</div>
        {sub && <div style={{ fontSize: 12, color: theme.textMuted, marginTop: 2 }}>{sub}</div>}
      </div>
    );

    // ─── BOX PLOT COMPONENT ─────────────────────────────────────────────
    function BoxPlotChart({ data, title, yLabel, color }) {
      color = color || theme.cyan;
      const chartData = data.map(d => ({
        milestone: d.milestone,
        q1: d.q1,
        iqrRange: d.q3 - d.q1,
        med: d.med,
        iqrMean: d.iqrMean,
        whiskerLow: d.q1,
        whiskerHigh: d.q3,
        n: d.n,
        kept: d.kept,
      }));

      return (
        <div style={{ marginTop: 16 }}>
          <div style={{ fontSize: 13, color: theme.textMuted, marginBottom: 4, fontWeight: 600 }}>{title}</div>
          <div style={{ fontSize: 11, color: theme.textMuted, marginBottom: 12, display: "flex", gap: 16 }}>
            <span><span style={{ display: "inline-block", width: 12, height: 12, background: `${color}30`, border: `1px solid ${color}`, borderRadius: 2, verticalAlign: "middle", marginRight: 4 }} />Q1–Q3 range</span>
            <span><span style={{ display: "inline-block", width: 8, height: 8, background: theme.amber, borderRadius: "50%", verticalAlign: "middle", marginRight: 4 }} />Median</span>
            <span><span style={{ display: "inline-block", width: 8, height: 8, background: theme.purple, borderRadius: 2, verticalAlign: "middle", marginRight: 4 }} />IQR Mean</span>
          </div>
          <ResponsiveContainer width="100%" height={220}>
            <ComposedChart data={chartData} margin={{ top: 10, right: 20, bottom: 10, left: 10 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={theme.border} />
              <XAxis dataKey="milestone" tick={{ fill: theme.text, fontSize: 13 }} />
              <YAxis tick={{ fill: theme.textMuted, fontSize: 12 }} tickFormatter={v => {
                if (v >= 1e6) return `${(v/1e6).toFixed(0)}M`;
                if (v >= 1e3) return `${(v/1e3).toFixed(0)}K`;
                return v;
              }} />
              <Tooltip content={({ active, payload, label }) => {
                if (!active || !payload?.length) return null;
                const d = data.find(x => x.milestone === label);
                if (!d) return null;
                return (
                  <div style={{
                    background: theme.surface, border: `1px solid ${theme.border}`,
                    borderRadius: 6, padding: "10px 14px", fontSize: 12,
                  }}>
                    <div style={{ color: theme.textMuted, marginBottom: 6, fontSize: 11, textTransform: "uppercase", letterSpacing: 1 }}>{label} Milestone</div>
                    <div style={{ color: theme.textMuted }}>Q1: <strong style={{ color: theme.text }}>{d.q1.toLocaleString()}</strong></div>
                    <div style={{ color: theme.amber }}>Median: <strong>{d.med.toLocaleString()}</strong></div>
                    <div style={{ color: theme.textMuted }}>Q3: <strong style={{ color: theme.text }}>{d.q3.toLocaleString()}</strong></div>
                    <div style={{ color: theme.purple, marginTop: 4 }}>IQR Mean: <strong>{d.iqrMean.toLocaleString()}</strong></div>
                    <div style={{ color: theme.textMuted, marginTop: 4, fontSize: 11 }}>n={d.n} (kept {d.kept} after IQR filter)</div>
                  </div>
                );
              }} />
              <Bar dataKey="q1" stackId="box" fill="transparent" barSize={50} />
              <Bar dataKey="iqrRange" stackId="box" fill={`${color}30`} stroke={color} strokeWidth={1} barSize={50} radius={[2,2,2,2]} />
              <Line type="monotone" dataKey="med" stroke={theme.amber} strokeWidth={0} dot={{ r: 5, fill: theme.amber, strokeWidth: 0 }} name="Median" />
              <Line type="monotone" dataKey="iqrMean" stroke={theme.purple} strokeWidth={0} dot={{ r: 4, fill: theme.purple, strokeWidth: 0 }} name="IQR Mean" />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      );
    }

    // ─── PANELS ──────────────────────────────────────────────────────────

    function FunnelPanel() {
      const conversionRates = [
        { from: "1K", to: "1M", rate: ((93/220)*100).toFixed(1) },
        { from: "1M", to: "1B", rate: ((25/93)*100).toFixed(1) },
        { from: "1B", to: "1T", rate: ((9/25)*100).toFixed(1) },
      ];
      return (
        <div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
            {funnelData.map(d => (
              <StatCard key={d.name} label={d.name} value={d.players} sub="players" />
            ))}
          </div>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={funnelData} layout="vertical" margin={{ left: 20, right: 40 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={theme.border} horizontal={false} />
              <XAxis type="number" tick={{ fill: theme.textMuted, fontSize: 12 }} />
              <YAxis dataKey="name" type="category" width={100} tick={{ fill: theme.text, fontSize: 13 }} />
              <Tooltip content={<CustomTooltip />} />
              <Bar dataKey="players" radius={[0, 4, 4, 0]} barSize={36}>
                {funnelData.map((d, i) => (
                  <Cell key={i} fill={d.fill} />
                ))}
                <LabelList dataKey="players" position="right" fill={theme.text} fontSize={14} fontWeight={600} />
              </Bar>
            </BarChart>
          </ResponsiveContainer>
          <div style={{ display: "flex", gap: 12, marginTop: 16, flexWrap: "wrap" }}>
            {conversionRates.map(c => (
              <div key={c.from} style={{
                background: theme.surface, border: `1px solid ${theme.border}`,
                borderRadius: 6, padding: "8px 14px", fontSize: 13,
              }}>
                <span style={{ color: theme.textMuted }}>{c.from} → {c.to}:</span>{" "}
                <span style={{ color: theme.accent, fontWeight: 600 }}>{c.rate}%</span>
              </div>
            ))}
            <div style={{
              background: theme.surface, border: `1px solid ${theme.border}`,
              borderRadius: 6, padding: "8px 14px", fontSize: 13,
            }}>
              <span style={{ color: theme.textMuted }}>Overall 1K → 1T:</span>{" "}
              <span style={{ color: theme.amber, fontWeight: 600 }}>{((9/220)*100).toFixed(1)}%</span>
            </div>
          </div>
          <InsightBox>
            42% of players who reach 1K credits go on to hit 1M — strong early-game retention. The steepest drop is 1M → 1B (27%), indicating the mid-game progression wall typical of idle games. The 9 players who reached 1T represent the highly engaged core.
          </InsightBox>
        </div>
      );
    }

    function EconomyPanel() {
      return (
        <div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
            <StatCard label="Click % at 1K" value="76%" sub="active-dominant early" />
            <StatCard label="Click % at 1T" value="23%" sub="passive takes over" />
            <StatCard label="Crossover Point" value="~1B" sub="passive exceeds click" />
          </div>
          <ResponsiveContainer width="100%" height={320}>
            <AreaChart data={clickVsPassive} margin={{ top: 10, right: 20, bottom: 10, left: 0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={theme.border} />
              <XAxis dataKey="milestone" tick={{ fill: theme.text, fontSize: 13 }} />
              <YAxis tick={{ fill: theme.textMuted, fontSize: 12 }} domain={[0, 100]} unit="%" />

            </div>
            <div style={{ fontSize: 12, color: theme.textMuted, lineHeight: 1.7 }}>
              <strong style={{ color: theme.textMuted }}>Cause:</strong> A PlayerPrefs key mismatch — the save call used the string literal <code style={{ background: theme.bg, padding: "2px 5px", borderRadius: 3, fontSize: 11 }}>"FirstOpenDateKey"</code> instead of the variable value <code style={{ background: theme.bg, padding: "2px 5px", borderRadius: 3, fontSize: 11 }}>"FirstOpenDate"</code>. This caused the existence check to always fail, overwriting the timestamp on every launch.<br/>
              <strong style={{ color: theme.textMuted }}>Impact:</strong> The timeElapsed metric is unreliable at later milestones (1T median = 2 seconds, Q1 = 1 second). Only 1K and 1M time data should be considered valid in this dataset. Click-intensity metrics derived from timeElapsed are excluded for 1B and 1T.<br/>
              <strong style={{ color: theme.textMuted }}>Resolution:</strong> Corrected the save call to reference the variable rather than the literal string.
            </div>
          </div>

          <div style={{
            background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 8,
            padding: "16px 18px", marginBottom: 20,
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: theme.text }}>3. Float Precision Degradation at High Values</div>
              <div style={{ fontSize: 11, fontWeight: 600, color: theme.accent, background: `${theme.accent}15`, padding: "2px 8px", borderRadius: 4 }}>RESOLVED</div>
            </div>
            <div style={{ fontSize: 12, color: theme.textMuted, lineHeight: 1.7 }}>
              <strong style={{ color: theme.textMuted }}>Cause:</strong> Core score accumulators (mainScore, totalScore, scorePerSecond) were stored as 32-bit floats, which provide only ~7 significant digits of precision.<br/>
              <strong style={{ color: theme.textMuted }}>Impact:</strong> At values exceeding ~10⁷, small per-frame increments are lost to floating-point truncation. Late-game players (1B+ range) may experience score stalling or irregular accumulation. This does not affect the milestone event data directly, but may influence the rate at which milestones are reached.<br/>
              <strong style={{ color: theme.textMuted }}>Resolution:</strong> Migrated all accumulating score variables to 64-bit doubles, replaced Mathf calls with System.Math equivalents, and implemented string-based PlayerPrefs serialization with round-trip formatting.
            </div>
          </div>

          <div style={{ fontSize: 13, color: theme.text, fontWeight: 600, marginBottom: 10 }}>
            Outlier Handling Methodology
          </div>
          <div style={{ fontSize: 12, color: theme.textMuted, lineHeight: 1.8, marginBottom: 16 }}>
            All "IQR Mean" values throughout this dashboard apply the interquartile range method: observations beyond 1.5× IQR from Q1 or Q3 are excluded before computing the mean. This standard approach removes extreme values on both ends — under-engaged sessions (too low) and atypical grinder behavior (too high) — to produce a more representative measure of typical player progression.
          </div>

          <div style={{ fontSize: 13, color: theme.text, fontWeight: 600, marginBottom: 10 }}>
            Outlier Impact by Metric
          </div>
          <table style={{ width: "100%", borderCollapse: "collapse", background: theme.surface, borderRadius: 6, overflow: "hidden" }}>
            <thead>
              <tr style={{ background: theme.surfaceHover }}>
                <th style={{ padding: "8px 12px", fontSize: 11, color: theme.textMuted, textAlign: "left", textTransform: "uppercase", letterSpacing: 0.5 }}>Metric</th>
                <th style={{ padding: "8px 12px", fontSize: 11, color: theme.textMuted, textAlign: "left", textTransform: "uppercase", letterSpacing: 0.5 }}>Milestone</th>
                <th style={{ padding: "8px 12px", fontSize: 11, color: theme.textMuted, textAlign: "right", textTransform: "uppercase", letterSpacing: 0.5 }}>Raw Avg</th>
                <th style={{ padding: "8px 12px", fontSize: 11, color: theme.textMuted, textAlign: "right", textTransform: "uppercase", letterSpacing: 0.5 }}>IQR Mean</th>
                <th style={{ padding: "8px 12px", fontSize: 11, color: theme.textMuted, textAlign: "right", textTransform: "uppercase", letterSpacing: 0.5 }}>Diff</th>
                <th style={{ padding: "8px 12px", fontSize: 11, color: theme.textMuted, textAlign: "right", textTransform: "uppercase", letterSpacing: 0.5 }}>Filtered</th>
              </tr>
            </thead>
            <tbody>
              {[
                { metric: "Buildings (total)", ms: "1K", raw: 13.0, iqr: 11.9, n: 220, kept: 214 },
                { metric: "Buildings (total)", ms: "1M", raw: 84.0, iqr: 82.1, n: 93, kept: 92 },
                { metric: "Time Elapsed", ms: "1K", raw: 277, iqr: 193.6, n: 220, kept: 208 },
                { metric: "Time Elapsed", ms: "1M", raw: 2489, iqr: 892.5, n: 93, kept: 83 },
                { metric: "Total Clicks", ms: "1K", raw: 356, iqr: 320.1, n: 220, kept: 208 },
                { metric: "Total Clicks", ms: "1M", raw: 3130, iqr: 2348.9, n: 93, kept: 86 },
                { metric: "Upgrades", ms: "1K", raw: 0.9, iqr: 0.5, n: 220, kept: 216 },
                { metric: "Upgrades", ms: "1M", raw: 10.9, iqr: 10.7, n: 93, kept: 85 },
              ].map((r, i) => {
                const diff = (((r.raw - r.iqr) / r.raw) * 100).toFixed(0);
                return (
                  <tr key={i} style={{ borderBottom: `1px solid ${theme.border}` }}>
                    <td style={{ padding: "6px 12px", fontSize: 12, color: theme.text }}>{r.metric}</td>
                    <td style={{ padding: "6px 12px", fontSize: 12, color: theme.textMuted }}>{r.ms}</td>
                    <td style={{ padding: "6px 12px", fontSize: 12, color: theme.textMuted, textAlign: "right", fontFamily: "monospace" }}>{r.raw.toLocaleString()}</td>
                    <td style={{ padding: "6px 12px", fontSize: 12, color: theme.accent, textAlign: "right", fontFamily: "monospace" }}>{r.iqr.toLocaleString()}</td>
                    <td style={{ padding: "6px 12px", fontSize: 12, color: Math.abs(diff) > 20 ? theme.amber : theme.textMuted, textAlign: "right" }}>-{diff}%</td>
                    <td style={{ padding: "6px 12px", fontSize: 12, color: theme.textMuted, textAlign: "right" }}>{r.n - r.kept}/{r.n}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          <InsightBox>
            Time elapsed is the metric most affected by outlier filtering — the IQR mean at 1M is 893s compared to a raw average of 2,489s, a 64% reduction, indicating a small number of extreme sessions significantly skewed the distribution. Building and upgrade metrics are well-distributed, with IQR filtering producing only a 2–10% adjustment. The most impactful finding was the timeElapsed persistence defect at 1B/1T, which produced fundamentally invalid data rather than merely skewed distributions. All three identified issues have been addressed and will be reflected in the post-1.40 dataset.
          </InsightBox>
        </div>
      );
    }

    // ─── MAIN ────────────────────────────────────────────────────────────

    function Dashboard() {
      const [activeTab, setActiveTab] = useState("funnel");

      const panels = {
        funnel: <FunnelPanel />,
        economy: <EconomyPanel />,
        buildings: <BuildingsPanel />,
        upgrades: <UpgradesPanel />,
        time: <TimePanel />,
        pricing: <PricingPanel />,
        dataQuality: <DataQualityPanel />,
      };

      return (
        <div style={{
          background: theme.bg,
          minHeight: "100vh",
          fontFamily: "'Geist', system-ui, -apple-system, sans-serif",
          color: theme.text,
          padding: "24px 20px",
        }}>
          {/* Header */}
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontSize: 11, color: theme.accent, textTransform: "uppercase", letterSpacing: 2, marginBottom: 4 }}>
              Case Study · Analytics
            </div>
            <h1 style={{
              fontFamily: "'Instrument Serif', Georgia, serif",
              fontSize: 28,
              fontWeight: 400,
              margin: 0,
              lineHeight: 1.2,
            }}>
              Idle Cyberpunk City Clicker
            </h1>
            <div style={{ fontSize: 13, color: theme.textMuted, marginTop: 6 }}>
              Behavioral analytics from 220 tracked players · pre-1.40 build · Milestone snapshots at 1K / 1M / 1B / 1T credits produced
            </div>
          </div>

          {/* Tabs */}
          <div style={{
            display: "flex",
            gap: 4,
            marginBottom: 24,
            flexWrap: "wrap",
            borderBottom: `1px solid ${theme.border}`,
            paddingBottom: 1,
          }}>
            {tabs.map(tab => (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                style={{
                  background: activeTab === tab.id ? theme.surfaceHover : "transparent",
                  border: "none",
                  borderBottom: activeTab === tab.id ? `2px solid ${theme.accent}` : "2px solid transparent",
                  padding: "8px 16px",
                  color: activeTab === tab.id ? theme.text : theme.textMuted,
                  fontSize: 13,
                  fontWeight: activeTab === tab.id ? 600 : 400,
                  cursor: "pointer",
                  borderRadius: "6px 6px 0 0",
                  transition: "all 0.15s",
                }}
              >
                {tab.label}
              </button>
            ))}
          </div>

          {/* Active Panel */}
          <div style={{
            background: theme.surface,
            border: `1px solid ${theme.border}`,
            borderRadius: 10,
            padding: "24px 20px",
          }}>
            {panels[activeTab]}
          </div>

          {/* Footer */}
          <div style={{
            marginTop: 20,
            fontSize: 11,
            color: theme.textMuted,
            textAlign: "center",
          }}>
            Jhorro Productions · Analytics Dashboard · Data: Unity Analytics (pre-1.40)
          </div>
        </div>
      );
    }

    // ─── RENDER ──────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Dashboard />);
  </script>
